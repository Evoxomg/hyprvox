label {
    monitor =
    text = Enter password to unlock
    color = rgba(140, 148, 168, 1.0)
    font_size = 13
    font_family = JetBrainsMono Nerd Font
    position = 0, 35
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 420, 58
    position = 0, -40
    halign = center
    valign = center

    outline_thickness = 2
    dots_size = 0.22
    dots_spacing = 0.22
    dots_center = true

    outer_color = rgba(95, 140, 200, 1.0)
    inner_color = rgba(52, 58, 76, 0.95)
    font_color = rgba(230, 233, 238, 1.0)
    fade_on_empty = false
    placeholder_text = <span foreground="##8c94a8">Password...</span>
    hide_input = false
    rounding = 0

    check_color = rgba(44, 212, 255, 1.0)
    fail_color = rgba(255, 90, 90, 1.0)
    fail_text = <span foreground="##ff5a5a">Authentication failed</span>
    capslock_color = rgba(255, 190, 80, 1.0)
}

shape {
