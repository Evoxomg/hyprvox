general {
    grace = 2
    hide_cursor = true
    no_fade_in = false
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 6
    noise = 0.011
    contrast = 1.05
    brightness = 0.82
    vibrancy = 0.15
    vibrancy_darkness = 0.1
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%H:%M')"
    color = rgba(220, 223, 228, 1.0)
    font_size = 26
    font_family = JetBrainsMono Nerd Font SemiBold
    position = 0, 420
    halign = center
    valign = top
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%A, %d %B')"
    color = rgba(140, 148, 168, 1.0)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 0, 388
    halign = center
    valign = top
}

shape {
    monitor =
    size = 860, 420
    color = rgba(43, 48, 63, 0.78)
    position = 0, -10
    halign = center
    valign = center
    rounding = 0
    border_size = 2
    border_color = rgba(95, 140, 200, 0.95)
}

shape {
    monitor =
    size = 860, 2
